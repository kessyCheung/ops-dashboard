// ═══════════════════════════════════════
// Calendar
// ═══════════════════════════════════════
let calYear, calMonth;
function initCal() { const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth(); }

let dragData = null;

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${calYear} 年 ${calMonth+1} 月`;
  const grid = document.getElementById('cal-grid');
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = ['日','一','二','三','四','五','六'];
  const firstDay = new Date(calYear,calMonth,1).getDay();
  const dim = daysInMonth(calYear,calMonth);
  const calStart = new Date(calYear,calMonth,1-firstDay);
  const totalCells = Math.ceil((firstDay+dim)/7)*7;
  const calEnd = new Date(calYear,calMonth,1-firstDay+totalCells-1);

  // Build occurrence map
  const occMap = {};
  data.tasks.forEach(task => {
    const effs = getEffective(task, calStart, calEnd);
    effs.forEach(e => {
      const key = toDateStr(e.date);
      if(!occMap[key])occMap[key]=[];
      const done = isCompleted(task.id, key);
      occMap[key].push({ id:task.id, name:task.name, freq:task.freq, type:'task', done, origDate:key });
    });
  });

  // Add main tasks: show on startDate (or deadline if no start) through deadline
  (data.mainTasks||[]).forEach(t => {
    if(t.done || !t.deadline) return;
    const dl = parseDate(t.deadline);
    const st = t.startDate ? parseDate(t.startDate) : dl; // default: only on deadline day
    const showFrom = st < dl ? st : dl;
    // Show on startDate and deadline in calendar
    [toDateStr(showFrom), t.deadline].forEach(key => {
      if(!occMap[key])occMap[key]=[];
      const isDeadline = key === t.deadline;
      const overdue = dl < today && isDeadline;
      // Avoid duplicates if start=deadline
      if(key === toDateStr(showFrom) && key === t.deadline) {
        occMap[key].push({ id:'m'+t.id, name:t.name||'（主要任務）', freq:'main', type: overdue?'overdue':'main', done:false });
      } else {
        occMap[key].push({ id:'m'+t.id, name:t.name||'（主要任務）', freq:'main', type: isDeadline?(overdue?'overdue':'main'):'main-start', done:false });
      }
    });
  });

  // Add todos
  const todayStr = toDateStr(today);
  data.todos.forEach(t => {
    if(t.done)return;
    const dateKey = t.dueDate||todayStr;
    if(!occMap[dateKey])occMap[dateKey]=[];
    occMap[dateKey].push({ id:'t'+t.id, name:t.name||'（待辦）', freq:'todo', type:'todo', done:false });
  });

  let html = dow.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  for(let i=0;i<totalCells;i++){
    const cellDate = new Date(calYear,calMonth,1-firstDay+i);
    const isOutside = cellDate.getMonth()!==calMonth;
    const isToday = sameDay(cellDate,today);
    const key = toDateStr(cellDate);
    const items = occMap[key]||[];
    let cls = 'cal-cell';
    if(isOutside)cls+=' outside'; if(isToday)cls+=' today';

    let itemsHtml = '';
    const maxShow = 4;
    items.slice(0,maxShow).forEach(item => {
      if(item.type==='main'||item.type==='main-start'){
        const prefix = item.type==='main-start' ? '📅 ' : '⭐ ';
        const bg = item.type==='main-start' ? '#EFF6FF' : '#DBEAFE';
        itemsHtml+=`<div class="cal-task" style="background:${bg};color:#1E40AF;border-left:3px solid #3B82F6"
          title="${esc(item.name)}">${prefix}${esc(item.name)}</div>`;
      } else if(item.type==='todo'||item.type==='overdue'){
        itemsHtml+=`<div class="cal-task is-${item.type}" style="background:#FFF3E0;color:#E65100"
          title="${esc(item.name)}">${item.type==='overdue'?'⏰ ':'📌 '}${esc(item.name)}</div>`;
      } else {
        const fc=FREQ_COLORS[item.freq]||FREQ_COLORS.monthly;
        itemsHtml+=`<div class="cal-task ${item.done?'is-completed':''}" style="background:${fc.bg};color:${fc.text}"
          draggable="true" ondragstart="calDragStart(event,${item.id},'${item.origDate}')"
          title="${esc(item.name)}">${esc(item.name)}</div>`;
      }
    });
    if(items.length>maxShow) itemsHtml+=`<div class="cal-more" style="cursor:pointer;color:var(--accent);text-decoration:underline;" onclick="event.stopPropagation();showDayPopup('${key}')">+${items.length-maxShow} 項 ▾</div>`;

    html+=`<div class="${cls}" data-date="${key}"
      ondragover="calDragOver(event)" ondragleave="calDragLeave(event)" ondrop="calDrop(event,'${key}')"
      ondblclick="calCellDblClick('${key}')">
      <div class="cal-date" style="cursor:pointer;" onclick="event.stopPropagation();showDayPopup('${key}')">${cellDate.getDate()}</div>${itemsHtml}</div>`;
  }
  grid.innerHTML = html;
}

// Drag and Drop
function calDragStart(e, taskId, origDate) {
  dragData = { taskId, origDate };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId+'|'+origDate);
}

function calDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function calDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function calDrop(e, targetDate) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const raw = e.dataTransfer.getData('text/plain');
  if(!raw)return;
  const [taskId, origDate] = raw.split('|');
  if(origDate === targetDate) return;
  // Create override
  data.overrides[taskId+'_'+origDate] = targetDate;
  saveData();
  renderCalendar();
  renderTodayBanner();
}

// Double-click cell to add todo
function calCellDblClick(dateStr) {
  const cell = document.querySelector(`.cal-cell[data-date="${dateStr}"]`);
  if(!cell)return;
  // Check if input already exists
  if(cell.querySelector('.cal-add-input'))return;
  const input = document.createElement('input');
  input.className = 'cal-add-input';
  input.placeholder = '新增待辦...';
  input.onkeydown = function(e) {
    if(e.key==='Enter'&&this.value.trim()){
      addTodo(this.value.trim(), dateStr);
      this.remove();
    }
    if(e.key==='Escape') this.remove();
  };
  input.onblur = function() { setTimeout(()=>this.remove(),200); };
  cell.appendChild(input);
  input.focus();
}

function showDayPopup(dateStr) {
  const d = parseDate(dateStr);
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  const items = [];
  const dayStart = new Date(d); dayStart.setHours(0,0,0,0);
  const dayEnd = new Date(d); dayEnd.setHours(23,59,59,999);
  data.tasks.forEach(task => {
    const effs = getEffective(task, dayStart, dayEnd);
    effs.forEach(e => {
      const done = isCompleted(task.id, toDateStr(e.date));
      const fc = FREQ_COLORS[task.freq] || FREQ_COLORS.monthly;
      items.push({ name: task.name, tag: FREQ_LABELS[task.freq], tagBg: fc.bg, tagColor: fc.text, dotColor: fc.text, done });
    });
  });
  (data.mainTasks||[]).forEach(t => {
    if(t.done || !t.deadline) return;
    const dl = parseDate(t.deadline);
    const st = t.startDate ? parseDate(t.startDate) : dl;
    const showDates = [toDateStr(st), t.deadline];
    if(showDates.includes(dateStr)) {
      const isDeadline = dateStr === t.deadline;
      const overdue = dl < today && isDeadline;
      items.push({ name: t.name, tag: isDeadline ? (overdue ? '⏰ 截止' : '截止日') : '開始日', tagBg: overdue ? '#FEE2E2' : '#DBEAFE', tagColor: overdue ? '#DC2626' : '#1E40AF', dotColor: overdue ? '#DC2626' : '#3B82F6', done: false });
    }
  });
  data.todos.forEach(t => {
    if(t.done) return;
    const dateKey = t.dueDate || todayStr;
    if(dateKey === dateStr) {
      items.push({ name: t.name || '（待辦）', tag: '庶務', tagBg: '#FFF3E0', tagColor: '#E65100', dotColor: '#E65100', done: false });
    }
  });
  const dow = ['日','一','二','三','四','五','六'];
  const dateLabel = `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日（${dow[d.getDay()]}）`;
  let bodyHtml = '';
  if(items.length === 0) {
    bodyHtml = '<div class="cal-day-popup-empty">🐾 這天沒有任務</div>';
  } else {
    items.forEach(item => {
      bodyHtml += `<div class="cal-day-popup-item${item.done?' is-completed':''}">
        <span class="popup-dot" style="background:${item.dotColor}"></span>
        <span class="popup-name" style="${item.done?'text-decoration:line-through;opacity:0.5;':''}">${esc(item.name)}</span>
        <span class="popup-tag" style="background:${item.tagBg};color:${item.tagColor}">${item.tag}</span>
      </div>`;
    });
  }
  const overlay = document.createElement('div');
  overlay.className = 'cal-day-popup-overlay';
  overlay.innerHTML = `<div class="cal-day-popup">
    <div class="cal-day-popup-header"><h3>📋 ${dateLabel}</h3>
      <button class="cal-day-popup-close" onclick="this.closest('.cal-day-popup-overlay').remove()">&times;</button>
    </div><div class="cal-day-popup-body">${bodyHtml}</div></div>`;
  overlay.addEventListener('click', function(e) { if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function calToday(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();renderCalendar();}

// ═══════════════════════════════════════
// Tab / Render
// ═══════════════════════════════════════
// ═══════════════════════════════════════
// Gantt (Hybrid)
// ═══════════════════════════════════════
function renderGantt() {
  const container = document.getElementById('gantt-container');
  if(!container) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const dayW = 28;
  const LEFT_W = 180;

  // Timeline range: 2 weeks before today to 120 days after, extended by mainTask dates, aligned to weeks
  let startDate = new Date(today); startDate.setDate(startDate.getDate() - 14);
  while (startDate.getDay() !== 1) startDate.setDate(startDate.getDate() - 1); // Monday
  let endDate = new Date(today); endDate.setDate(endDate.getDate() + 120);
  (data.mainTasks || []).forEach(t => {
    if (t.deadline) { const dl = parseDate(t.deadline); if (dl && dl > endDate) endDate = new Date(dl); }
    if (t.startDate) { const st = parseDate(t.startDate); if (st && st < startDate) startDate = new Date(st); }
  });
  while (endDate.getDay() !== 0) endDate.setDate(endDate.getDate() + 1); // Sunday

  const totalDays = daysBetween(startDate, endDate) + 1;
  const timelineW = totalDays * dayW;
  const dateToX = (d) => daysBetween(startDate, d) * dayW;
  const todayX = dateToX(today);

  // Build header: weekend bands, month labels, day ticks
  let weekendBands = '', dayTicks = '', monthLabels = '';
  let monthStart = 0, monthLabel = `${startDate.getFullYear()}/${startDate.getMonth()+1}`;
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(startDate); d.setDate(d.getDate() + i);
    const x = i * dayW;
    if (i > 0 && d.getDate() === 1) {
      const mx = monthStart * dayW, mw = (i - monthStart) * dayW;
      monthLabels += `<div class="gantt-month-label" style="left:${mx}px;width:${mw}px">${monthLabel}</div>`;
      monthStart = i; monthLabel = `${d.getFullYear()}/${d.getMonth()+1}`;
    }
    if (d.getDay() === 0 || d.getDay() === 6) weekendBands += `<div class="gantt-weekend" style="left:${x}px;width:${dayW}px"></div>`;
    dayTicks += `<div class="gantt-day-tick${sameDay(d, today) ? ' is-today' : ''}" style="left:${x}px;width:${dayW}px">${d.getDate()}</div>`;
  }
  monthLabels += `<div class="gantt-month-label" style="left:${monthStart*dayW}px;width:${(totalDays-monthStart)*dayW}px">${monthLabel}</div>`;

  // Helpers for sections
  const sectionRow = (label) => `<div class="gantt-section-row" style="min-width:${LEFT_W + timelineW}px"><div class="gantt-section-header">${label}</div></div>`;
  const todayColHelper = `<div class="gantt-today-col" style="left:${todayX}px;width:${dayW}px"></div>`;
  const emptyRow = (text) => `<div class="gantt-row" style="min-width:${LEFT_W + timelineW}px"><div class="gantt-empty">${text}</div><div class="gantt-track" style="width:${timelineW}px">${weekendBands}${todayColHelper}</div></div>`;

  let rowsHtml = '';
  const todayCol = `<div class="gantt-today-col" style="left:${todayX}px;width:${dayW}px"></div>`;

  // ── Section 1: Main tasks (bars with countdown) ──
  rowsHtml += sectionRow('⭐ 主線任務');
  const activeMain = (data.mainTasks || []).filter(t => !t.done && t.deadline);
  activeMain.sort((a,b) => (a.startDate||a.deadline).localeCompare(b.startDate||b.deadline));
  if (activeMain.length === 0) {
    rowsHtml += emptyRow('🐾 目前沒有主線任務');
  } else {
    activeMain.forEach(t => {
      const dl = parseDate(t.deadline);
      const st = t.startDate ? parseDate(t.startDate) : dl;
      const x1 = Math.max(0, dateToX(st));
      const x2 = Math.min(timelineW, dateToX(dl) + dayW);
      const w = Math.max(dayW, x2 - x1);
      const dlDiff = daysBetween(today, dl);
      const overdue = dlDiff < 0;
      const soon = dlDiff >= 0 && dlDiff <= 3;
      const barCls = overdue ? 'overdue' : (soon ? 'soon' : '');
      // Countdown label
      let countdown = '';
      if (dlDiff < 0) countdown = `⏰ 過期 ${Math.abs(dlDiff)} 天`;
      else if (dlDiff === 0) countdown = '🔴 今天截止';
      else if (dlDiff <= 7) countdown = `剩 ${dlDiff} 天`;
      const tooltip = [t.name, `開始：${t.startDate || '即刻'}`, `截止：${t.deadline}`, countdown, t.nextAction ? `下一步：${t.nextAction}` : '', t.note ? `備註：${t.note}` : ''].filter(Boolean).join('\n');
      const metaRange = t.startDate ? `${formatDateShort(st)} → ${formatDateShort(dl)}` : `截止 ${formatDateShort(dl)}`;
      rowsHtml += `<div class="gantt-row">
        <div class="gantt-left">
          <div class="gantt-left-name" title="${esc(t.name)}">${esc(t.name)}</div>
          <div class="gantt-left-meta"><span class="gantt-type-tag main">主線</span><span>${metaRange}</span></div>
        </div>
        <div class="gantt-track main-track" style="width:${timelineW}px">
          ${weekendBands}${todayCol}
          <div class="gantt-bar ${barCls}" style="left:${x1}px;width:${w}px" title="${esc(tooltip)}">
            <span class="gantt-bar-label">${esc(t.name)}</span>
            ${countdown ? `<span class="gantt-bar-countdown">${countdown}</span>` : ''}
          </div>
        </div>
      </div>`;
    });
  }

  // ── Section 2: Fixed recurring — grouped by frequency, ◆ markers + connecting lines ──
  const fixedFreqs = ['weekly','monthly','bimonthly','quarterly','yearly'];
  const fixedGroups = {};
  data.tasks.filter(t => fixedFreqs.includes(t.freq)).forEach(t => {
    if(!fixedGroups[t.freq]) fixedGroups[t.freq] = [];
    fixedGroups[t.freq].push(t);
  });

  rowsHtml += sectionRow('📋 固定例行任務');
  let hasFixed = false;
  fixedFreqs.forEach(freq => {
    const tasks = fixedGroups[freq];
    if(!tasks || !tasks.length) return;
    hasFixed = true;
    tasks.sort((a,b) => nextOcc(a, today) - nextOcc(b, today));
    const fc = FREQ_COLORS[freq];
    // Sub-header per frequency
    rowsHtml += `<div class="gantt-row" style="min-width:${LEFT_W + timelineW}px;border-bottom:none;">
      <div class="gantt-sub-header">${FREQ_EMOJI[freq]} ${FREQ_LABELS[freq]}（${tasks.length}）</div>
      <div class="gantt-track" style="width:${timelineW}px;height:24px;">${weekendBands}${todayCol}</div></div>`;

    tasks.forEach(task => {
      const occs = getEffective(task, startDate, endDate);
      let markers = '';
      occs.forEach(e => {
        const x = dateToX(e.date) + dayW/2;
        if(x < 0 || x > timelineW) return;
        const done = isCompleted(task.id, toDateStr(e.date));
        const tooltip = [task.name, `${FREQ_LABELS[task.freq]} · ${toDateStr(e.date)}`, task.owner ? `負責人：${task.owner}` : '', task.note ? `備註：${task.note}` : '', done ? '✅ 已完成' : ''].filter(Boolean).join('\n');
        markers += `<div class="gantt-marker ${task.freq} ${done ? 'done' : ''}" style="left:${x}px" title="${esc(tooltip)}"></div>`;
      });
      rowsHtml += `<div class="gantt-row">
        <div class="gantt-left">
          <div class="gantt-left-name" title="${esc(task.name)}">${esc(task.name)}</div>
          <div class="gantt-left-meta">${task.owner ? `<span>${esc(task.owner)}</span>` : ''}</div>
        </div>
        <div class="gantt-track" style="width:${timelineW}px">
          ${weekendBands}${todayCol}
          ${markers}
        </div>
      </div>`;
    });
  });
  if(!hasFixed) rowsHtml += emptyRow('無');

  // ── Section 3: High-frequency chores — collapsed summary ──
  const dailyTasks = data.tasks.filter(t => t.freq === 'daily');
  const every2Tasks = data.tasks.filter(t => t.freq === 'every2days');
  rowsHtml += sectionRow('🧹 高頻庶務');
  if(dailyTasks.length === 0 && every2Tasks.length === 0) {
    rowsHtml += emptyRow('無');
  } else {
    // Summary row for daily
    if(dailyTasks.length > 0) {
      const names = dailyTasks.map(t => t.name).join('\n');
      rowsHtml += `<div class="gantt-row">
        <div class="gantt-left">
          <div class="gantt-left-name">🔄 每天（${dailyTasks.length} 項）</div>
          <div class="gantt-left-meta" style="font-size:9px;">${dailyTasks.map(t=>esc(t.name)).join(' · ')}</div>
        </div>
        <div class="gantt-track" style="width:${timelineW}px">
          ${weekendBands}${todayCol}
          <div class="gantt-summary-band" style="left:0;width:${timelineW}px" title="${esc(names)}">每天 × ${dailyTasks.length}</div>
        </div>
      </div>`;
    }
    // Summary row for every2days
    if(every2Tasks.length > 0) {
      const names = every2Tasks.map(t => t.name).join('\n');
      rowsHtml += `<div class="gantt-row">
        <div class="gantt-left">
          <div class="gantt-left-name">🔃 每兩天（${every2Tasks.length} 項）</div>
          <div class="gantt-left-meta" style="font-size:9px;">${every2Tasks.map(t=>esc(t.name)).join(' · ')}</div>
        </div>
        <div class="gantt-track" style="width:${timelineW}px">
          ${weekendBands}${todayCol}
          <div class="gantt-summary-band" style="left:0;width:${timelineW}px;background:repeating-linear-gradient(90deg, rgba(255,224,178,0.4) 0px, rgba(255,224,178,0.4) 28px, rgba(255,204,128,0.6) 28px, rgba(255,204,128,0.6) 56px);border-color:rgba(230,81,0,0.25);color:#E65100;" title="${esc(names)}">每兩天 × ${every2Tasks.length}</div>
        </div>
      </div>`;
    }
  }

  // Compose
  const html = `<div class="gantt-scroll" id="gantt-scroll">
    <div class="gantt-row gantt-header-row">
      <div class="gantt-left">
        <div class="gantt-left-name">任務</div>
        <div class="gantt-left-meta">類型 · 頻率 · 負責人</div>
      </div>
      <div class="gantt-track gantt-header-track" style="width:${timelineW}px">
        ${weekendBands}
        <div class="gantt-today-col" style="left:${todayX}px;width:${dayW}px"><span class="gantt-today-label">Today</span></div>
        ${monthLabels}
        ${dayTicks}
      </div>
    </div>
    ${rowsHtml}
  </div>`;
  container.innerHTML = html;

  // Auto-scroll so today is visible
  const scroll = document.getElementById('gantt-scroll');
  if (scroll) scroll.scrollLeft = Math.max(0, todayX - 120);
}

// ═══════════════════════════════════════
// Progress Report (今日進度報告)
// ═══════════════════════════════════════
function renderProgressReport() {
  const container = document.getElementById('progress-report');
  if(!container) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  const dateLabel = formatDateFull(today);

  // Collect tasks with result or resultLink filled in
  const items = [];
  (data.mainTasks||[]).forEach(t => {
    if(!t.result && !t.resultLink && !t.nextAction) return;
    const dl = t.deadline ? formatDateShort(parseDate(t.deadline)) : '';
    const isDone = t.done && t.doneDate === todayStr;
    items.push({ name: t.name, deadline: dl, result: t.result||'', nextAction: t.nextAction||'', done: t.done, doneToday: isDone });
  });

  if(items.length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';

  // Build plain text report for copying
  let reportLines = [`📋 工作進度報告 — ${dateLabel}`, ''];
  items.forEach(t => {
    const status = t.doneToday ? '✅ 已完成' : '🔄 進行中';
    reportLines.push(`${status}｜${t.name}${t.deadline ? '（截止 '+t.deadline+'）' : ''}`);
    if(t.result) reportLines.push(`  ${t.result}`);
    if(!t.done && t.nextAction) reportLines.push(`  ▸ 下一步：${t.nextAction}`);
    reportLines.push('');
  });
  const reportText = reportLines.join('\n').trim();

  // Build visual HTML
  let bodyHtml = '';
  items.forEach(t => {
    const status = t.doneToday ? '<span style="color:var(--success);font-weight:700;">✅ 已完成</span>' : '<span style="color:var(--accent);font-weight:700;">🔄 進行中</span>';
    bodyHtml += `<div style="margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(216,232,240,0.4);">
      <div style="font-size:12px;font-weight:700;">${status} ${esc(t.name)} ${t.deadline ? '<span style="font-size:10px;color:var(--text-secondary);">（截止 '+t.deadline+'）</span>' : ''}</div>
      ${t.result ? '<div style="font-size:11px;margin-left:18px;margin-top:2px;">'+linkify(t.result)+'</div>' : ''}
      ${(!t.done && t.nextAction) ? '<div style="font-size:11px;margin-left:18px;margin-top:1px;color:var(--accent-hover);">▸ 下一步：'+esc(t.nextAction)+'</div>' : ''}
    </div>`;
  });

  container.innerHTML = `<div class="progress-report">
    <div class="progress-report-header">
      <h3>📣 今日進度報告</h3>
      <button class="progress-copy-btn" onclick="copyProgressReport()">📋 一鍵複製</button>
    </div>
    <div class="progress-report-body">
      ${bodyHtml}
      <textarea id="progress-report-text" style="position:absolute;left:-9999px;">${esc(reportText)}</textarea>
    </div>
  </div>`;
}

function copyProgressReport() {
  const textarea = document.getElementById('progress-report-text');
  if(!textarea) return;
  const text = textarea.value;
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=>{
      const btn = document.querySelector('.progress-copy-btn');
      if(btn){ const orig = btn.innerHTML; btn.innerHTML = '✅ 已複製！'; setTimeout(()=>btn.innerHTML=orig, 1500); }
    });
  } else {
    textarea.style.position='static'; textarea.select();
    document.execCommand('copy');
    textarea.style.position='absolute';
  }
}

// ═══════════════════════════════════════
// Board (任務版)
// ═══════════════════════════════════════
function renderBoard() {
  const container = document.getElementById('board-container');
  if(!container) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  const active = (data.mainTasks||[]).filter(t=>!t.done);
  const completed = (data.mainTasks||[]).filter(t=>t.done);

  // Sort active: started first, then by deadline
  active.sort((a,b) => {
    const nsA = a.startDate && a.startDate > todayStr ? 1 : 0;
    const nsB = b.startDate && b.startDate > todayStr ? 1 : 0;
    if(nsA!==nsB) return nsA - nsB;
    if(!a.deadline && !b.deadline) return 0;
    if(!a.deadline) return 1;
    if(!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  // Sort completed by doneDate descending (newest first)
  completed.sort((a,b) => (b.doneDate||'').localeCompare(a.doneDate||''));

  let html = '';
  html += `<div class="board-header"><h2>📌 任務版 <span class="count">${active.length}</span></h2>
    <button class="btn btn-primary" onclick="switchTab('tasks');toggleMainForm()">＋ 新增任務</button></div>`;

  if(active.length === 0) {
    html += `<div style="text-align:center;padding:40px;color:var(--text-secondary);font-size:13px;">🐾 目前沒有進行中的主線任務</div>`;
  }

  active.forEach(t => {
    const dl = parseDate(t.deadline);
    const st = t.startDate ? parseDate(t.startDate) : null;
    const dlDiff = dl ? daysBetween(today, dl) : 999;
    const notStarted = t.startDate && t.startDate > todayStr;

    let statusCls = 'active', statusText = '進行中';
    if(dlDiff < 0) { statusCls = 'overdue'; statusText = '⏰ 過期'; }
    else if(dlDiff <= 3 && dlDiff >= 0) { statusCls = 'soon'; statusText = '即將到期'; }
    if(notStarted) { statusCls = 'active'; statusText = '📅 未開始'; }

    const dateRange = (st ? formatDateShort(st) : '即刻') + ' → ' + (dl ? formatDateShort(dl) : '—');

    html += `<div class="board-card" style="${notStarted?'opacity:0.6;':''}">
      <div class="board-card-header">
        <button class="done-circle" onclick="boardDone(${t.id})" title="標記完成" ${notStarted?'disabled':''}></button>
        <div class="board-card-title editable" contenteditable="true" onblur="updateMain(${t.id},'name',this.textContent)">${esc(t.name||'')}</div>
        <span class="board-status ${statusCls}">${statusText}</span>
        <span class="board-card-dates">${dateRange}</span>
      </div>
      <div class="board-card-body">
        <div class="board-field">
          <div class="board-field-label">描述 / 目標</div>
          <div class="board-field-value empty-hint" contenteditable="true" data-placeholder="點擊輸入任務描述..."
            onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')"
            onblur="this.setAttribute('data-raw',this.textContent);updateMain(${t.id},'description',this.textContent);this.innerHTML=linkify(this.textContent)"
            data-raw="${esc(t.description||'')}">${linkify(t.description||'')}</div>
        </div>
        <div class="board-field">
          <div class="board-field-label">下一步行動</div>
          <div class="board-field-value empty-hint" contenteditable="true" data-placeholder="下一步要做什麼..."
            style="color:var(--accent-hover);font-weight:600;"
            onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')"
            onblur="this.setAttribute('data-raw',this.textContent);updateMain(${t.id},'nextAction',this.textContent);this.innerHTML=linkify(this.textContent)"
            data-raw="${esc(t.nextAction||'')}">${linkify(t.nextAction||'')}</div>
        </div>
        <div class="board-field">
          <div class="board-field-label">備註</div>
          <div class="board-field-value empty-hint" contenteditable="true" data-placeholder="備註..."
            onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')"
            onblur="this.setAttribute('data-raw',this.textContent);updateMain(${t.id},'note',this.textContent);this.innerHTML=linkify(this.textContent)"
            data-raw="${esc(t.note||'')}">${linkify(t.note||'')}</div>
        </div>
        <div style="border-top:1px dashed var(--border);margin-top:6px;padding-top:8px;">
          <div class="board-field">
            <div class="board-field-label">今日成果 / 進度說明</div>
            <div class="board-field-value board-result-link empty-hint" contenteditable="true" data-placeholder="寫下今天的進度，可直接貼連結..."
              style="min-height:36px;"
              onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')"
              onblur="this.setAttribute('data-raw',this.textContent);updateMain(${t.id},'result',this.textContent);this.innerHTML=linkify(this.textContent)"
              data-raw="${esc(t.result||'')}">${linkify(t.result||'')}</div>
          </div>
        </div>
      </div>
    </div>`;
  });

  // Done section
  html += `<div class="board-done-section">
    <button class="board-done-toggle" onclick="toggleDoneSection(this)">
      <span class="arrow">▶</span> ✅ 已完成（${completed.length}）
    </button>
    <div class="board-done-cards">`;

  if(completed.length === 0) {
    html += `<div style="text-align:center;padding:20px;color:var(--text-secondary);font-size:12px;">尚無已完成任務</div>`;
  }

  completed.forEach(t => {
    const doneDateLabel = t.doneDate ? formatDateShort(parseDate(t.doneDate)) : '—';
    html += `<div class="board-card done-card">
      <div class="board-card-header">
        <span style="font-size:16px;">✅</span>
        <div class="board-card-title" style="text-decoration:line-through;opacity:0.7;">${esc(t.name||'')}</div>
        <span class="board-card-dates">完成於 ${doneDateLabel}</span>
      </div>
      <div class="board-card-body">
        ${t.description ? `<div class="board-field"><div class="board-field-label">描述</div><div class="board-field-value">${linkify(t.description)}</div></div>` : ''}
        <div class="board-field">
          <div class="board-field-label">成果 / 進度說明</div>
          <div class="board-field-value board-result-link empty-hint" contenteditable="true" data-placeholder="補填成果說明，可直接貼連結..."
            style="min-height:36px;"
            onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')"
            onblur="this.setAttribute('data-raw',this.textContent);updateMain(${t.id},'result',this.textContent);this.innerHTML=linkify(this.textContent)"
            data-raw="${esc(t.result||'')}">${linkify(t.result||'')}</div>
        </div>
      </div>
    </div>`;
  });

  html += '</div></div>';
  container.innerHTML = html;
}

function boardDone(id) {
  const t = data.mainTasks.find(x=>x.id===id); if(!t) return;
  t.done = true;
  t.doneDate = toDateStr(new Date());
  saveData();
  renderAll();
}

function toggleDoneSection(btn) {
  btn.classList.toggle('open');
  const cards = btn.nextElementSibling;
  cards.classList.toggle('open');
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(el=>el.classList.toggle('active',el.id==='page-'+tab));
  if(tab==='calendar')renderCalendar();
  if(tab==='gantt')renderGantt();
  if(tab==='board')renderBoard();
}

function renderAll(){renderTodayBanner();renderProgressReport();renderTable();renderMainTasks();renderTodos();if(document.getElementById('page-calendar').classList.contains('active'))renderCalendar();if(document.getElementById('page-gantt').classList.contains('active'))renderGantt();if(document.getElementById('page-board').classList.contains('active'))renderBoard();}

// Init
loadData();
carryOverTodos();
initCal();
renderAll();
</script>
</body>
</html>
