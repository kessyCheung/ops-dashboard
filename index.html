<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營運任務管理 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F9FC; --surface: #FFFFFF; --border: #D8E8F0;
  --text: #2C3E50; --text-secondary: #7A8FA0;
  --accent: #6BB5E0; --accent-hover: #4A9BD9;
  --danger: #E07070; --warn: #E8A84C; --success: #6BC9A0;
  --font: 'Nunito', -apple-system, sans-serif;
  --shadow: 0 2px 12px rgba(100,150,200,0.08);
  --shadow-lg: 0 4px 20px rgba(100,150,200,0.12);
  --radius: 14px;
}

body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh;
  background-image: radial-gradient(ellipse at 10% 90%, rgba(150,200,240,0.12) 0%, transparent 50%), radial-gradient(ellipse at 90% 10%, rgba(180,220,255,0.15) 0%, transparent 50%); }

.pet-deco { position: fixed; pointer-events: none; z-index: 0; filter: grayscale(20%); }
.pet-deco.dog { bottom: 20px; left: 30px; font-size: 48px; opacity: 0.18; }
.pet-deco.cat { bottom: 20px; right: 30px; font-size: 48px; opacity: 0.18; }
.pet-deco.hamster { top: 100px; right: 60px; font-size: 36px; opacity: 0.13; }
.pet-deco.paw1 { top: 200px; left: 20px; font-size: 20px; opacity: 0.08; transform: rotate(-20deg); }
.pet-deco.paw2 { top: 450px; right: 40px; font-size: 18px; opacity: 0.07; transform: rotate(15deg); }
.pet-deco.paw3 { bottom: 180px; left: 60px; font-size: 16px; opacity: 0.07; transform: rotate(30deg); }

/* Header */
.header { background: linear-gradient(135deg, #EDF5FB 0%, #D6E8F5 100%); border-bottom: 2px solid var(--border); padding: 0 32px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1300px; margin: 0 auto; }
.header h1 { font-size: 22px; font-weight: 800; padding: 14px 0 0; display: flex; align-items: center; gap: 10px; }
.tabs { display: flex; gap: 6px; margin-top: 10px; }
.tab { padding: 8px 20px; font-size: 14px; font-weight: 600; color: var(--text-secondary); background: transparent; border: none; border-radius: 10px 10px 0 0; cursor: pointer; transition: all 0.2s; font-family: var(--font); position: relative; bottom: -2px; }
.tab:hover { color: var(--text); background: rgba(107,181,224,0.1); }
.tab.active { color: var(--accent); background: var(--bg); box-shadow: 0 -2px 8px rgba(107,181,224,0.15); border: 2px solid var(--border); border-bottom: 2px solid var(--bg); font-weight: 700; }
.tab .badge { background: var(--danger); color: #fff; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px; margin-left: 6px; }

/* Main */
.main { max-width: 1300px; margin: 0 auto; padding: 24px 32px 80px; position: relative; z-index: 1; }
.page { display: none; } .page.active { display: block; }

/* Section Card */
.section-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1.5px solid var(--border); background: linear-gradient(135deg, rgba(220,238,250,0.4), rgba(200,228,245,0.2)); }
.section-header h2 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.section-header .count { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px; }

/* Buttons */
.btn { font-family: var(--font); font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(107,181,224,0.3); }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: rgba(0,0,0,0.04); }

/* Today Banner */
.today-banner { background: linear-gradient(135deg, #6BB5E0 0%, #8FC8E8 100%); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 20px; color: #fff; box-shadow: var(--shadow-lg); position: relative; overflow: hidden; }
.today-banner::after { content: '🐾'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 56px; opacity: 0.12; }
.today-banner h2 { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
.today-banner .date-str { font-size: 12px; opacity: 0.9; margin-bottom: 10px; }
.today-section { margin-bottom: 8px; }
.today-section:last-child { margin-bottom: 0; }
.today-section-label { font-size: 11px; font-weight: 700; opacity: 0.85; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.today-divider { border-top: 1px solid rgba(255,255,255,0.3); margin: 8px 0; }
.today-tasks-list { display: flex; flex-wrap: wrap; gap: 5px; }
.today-task-chip { background: rgba(255,255,255,0.22); padding: 3px 10px; border-radius: 7px; font-size: 11px; font-weight: 600; }
.today-task-chip.overdue { background: rgba(232,93,93,0.35); border: 1px solid rgba(255,255,255,0.35); }
.today-task-chip.completed { opacity: 0.5; text-decoration: line-through; }
.today-none { font-size: 12px; opacity: 0.8; font-style: italic; }

/* Task Tables */
.table-scroll { overflow-x: auto; }
.freq-drop-zone.drag-over-freq { outline: 2px dashed var(--accent); outline-offset: -2px; background: rgba(107,181,224,0.06); }
.task-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
.task-table th { text-align: left; font-size: 10px; font-weight: 700; color: var(--text-secondary); padding: 7px 12px; border-bottom: 1.5px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
.task-table td { padding: 8px 12px; border-bottom: 1px solid rgba(240,230,218,0.4); font-size: 12px; vertical-align: top; }
.task-table tr:last-child td { border-bottom: none; }
.task-table tr:hover td { background: rgba(150,200,240,0.05); }

.col-done { width: 38px; text-align: center; }
.col-name { min-width: 160px; }
.col-next { width: 95px; }
.col-last { width: 100px; }
.col-owner { width: 70px; }
.col-note { min-width: 100px; }
.col-del { width: 32px; text-align: center; }

.done-circle { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.25s; padding: 0; font-size: 14px; line-height: 1; }
.done-circle::after { content: '🐾'; opacity: 0.25; font-size: 14px; }
.done-circle:hover { border-color: var(--accent); background: rgba(107,181,224,0.08); transform: scale(1.15); }
.done-circle:hover::after { opacity: 0.6; }
.done-circle.checked { border-color: var(--success); background: rgba(107,201,160,0.15); animation: popIn 0.3s ease; }
.done-circle.checked::after { content: '🐾'; opacity: 1; filter: none; }
@keyframes popIn { 0% { transform: scale(0.8); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

.task-name-main { font-weight: 600; font-size: 13px; }
.task-name-how { font-size: 10px; color: var(--text-secondary); margin-top: 1px; }
.task-name-link { font-size: 10px; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 2px; margin-top: 1px; }
.task-name-link:hover { text-decoration: underline; }

.freq-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.next-today { color: var(--danger); font-weight: 700; } .next-soon { color: var(--warn); font-weight: 700; } .next-normal { color: var(--text-secondary); } .next-overdue { color: var(--danger); font-weight: 700; }

.editable { cursor: text; min-height: 18px; outline: none; border-radius: 5px; padding: 1px 4px; margin: -1px -4px; transition: all 0.15s; }
.editable:hover { background: rgba(107,181,224,0.06); }
.editable:focus { background: rgba(107,181,224,0.1); box-shadow: 0 0 0 2px rgba(107,181,224,0.2); }

.freq-select, .dom-input, .date-input { font-family: var(--font); font-size: 12px; border: none; background: transparent; padding: 1px 4px; border-radius: 5px; outline: none; cursor: pointer; }
.freq-select:hover, .dom-input:hover, .date-input:hover { background: rgba(107,181,224,0.06); }
.freq-select:focus, .dom-input:focus, .date-input:focus { background: rgba(107,181,224,0.1); box-shadow: 0 0 0 2px rgba(107,181,224,0.2); }
.dom-input { width: 42px; } .date-input { width: 105px; } .freq-select { width: 100%; -webkit-appearance: none; }

.del-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 15px; padding: 3px; border-radius: 5px; opacity: 0; transition: all 0.15s; }
.task-table tr:hover .del-btn, .todo-table tr:hover .del-btn { opacity: 1; }
.del-btn:hover { color: var(--danger); background: rgba(232,93,93,0.1); }

/* Add Form */
.add-form { display: none; background: var(--surface); border: 2px solid var(--accent); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(107,181,224,0.15); }
.add-form.open { display: block; animation: slideDown 0.2s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.form-group label { display: block; font-size: 10px; font-weight: 700; color: var(--text-secondary); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; font-family: var(--font); font-size: 12px; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; outline: none; background: var(--surface); transition: all 0.2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(107,181,224,0.12); }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* Todo */
.todo-table { width: 100%; border-collapse: collapse; }
.todo-table th { text-align: left; font-size: 10px; font-weight: 700; color: var(--text-secondary); padding: 7px 12px; border-bottom: 1.5px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
.todo-table td { padding: 8px 12px; border-bottom: 1px solid rgba(240,230,218,0.4); font-size: 12px; vertical-align: top; }
.todo-table tr:last-child td { border-bottom: none; }
.todo-table tr:hover td { background: rgba(150,200,240,0.05); }
.todo-col-check { width: 38px; text-align: center; }
.todo-col-name { width: auto; }
.todo-col-note { width: 180px; }
.todo-col-del { width: 32px; text-align: center; }
.todo-check { width: 17px; height: 17px; cursor: pointer; accent-color: var(--accent); }
.todo-row.fading { opacity: 0; transform: translateX(20px); transition: all 0.4s ease; }
.carried-tag { font-size: 9px; color: var(--danger); font-weight: 700; display: block; margin-top: 1px; }

/* Calendar */
.cal-header { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 14px; }
.cal-header h2 { font-size: 20px; font-weight: 800; min-width: 200px; text-align: center; }
.cal-nav { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); font-weight: 600; transition: all 0.2s; }
.cal-nav:hover { background: rgba(107,181,224,0.08); border-color: var(--accent); }
.cal-today-btn { font-family: var(--font); font-size: 12px; padding: 6px 14px; border: 1.5px solid var(--accent); border-radius: 10px; background: rgba(107,181,224,0.08); cursor: pointer; color: var(--accent); font-weight: 700; transition: all 0.2s; }
.cal-today-btn:hover { background: var(--accent); color: #fff; }

.cal-grid { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; display: grid; grid-template-columns: repeat(7, 1fr); box-shadow: var(--shadow); }
.cal-dow { padding: 8px; text-align: center; font-size: 11px; font-weight: 700; color: var(--text-secondary); border-bottom: 1.5px solid var(--border); background: linear-gradient(180deg, rgba(220,238,250,0.4), transparent); }
.cal-cell { min-height: 105px; border-right: 1px solid rgba(240,230,218,0.4); border-bottom: 1px solid rgba(240,230,218,0.4); padding: 3px 5px; position: relative; transition: background 0.15s; }
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.outside { background: rgba(240,230,218,0.12); }
.cal-cell.today { background: rgba(107,181,224,0.08); }
.cal-cell.drag-over { background: rgba(107,181,224,0.15); outline: 2px dashed var(--accent); outline-offset: -2px; }
.cal-date { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 2px; }
.cal-cell.today .cal-date { color: #fff; background: var(--accent); display: inline-block; width: 21px; height: 21px; line-height: 21px; text-align: center; border-radius: 50%; font-weight: 700; }

.cal-task { font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: grab; font-weight: 600; transition: opacity 0.15s; }
.cal-task:active { cursor: grabbing; opacity: 0.7; }
.cal-task.is-todo { border-left: 3px solid var(--accent); }
.cal-task.is-overdue { border-left: 3px solid var(--danger); }
.cal-task.is-completed { opacity: 0.4; text-decoration: line-through; }
.cal-more { font-size: 10px; color: var(--text-secondary); padding: 2px 4px; font-weight: 600; }

/* Calendar inline add */
.cal-add-input { width: 100%; font-family: var(--font); font-size: 10px; border: 1px solid var(--accent); border-radius: 4px; padding: 2px 4px; outline: none; margin-top: 2px; }

/* Calendar day detail popup */
.cal-day-popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.25); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.cal-day-popup { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg), 0 8px 32px rgba(0,0,0,0.12); min-width: 320px; max-width: 420px; width: 90vw; max-height: 70vh; overflow: hidden; animation: popUp 0.2s ease; }
@keyframes popUp { from { transform: scale(0.95) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.cal-day-popup-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: linear-gradient(135deg, #6BB5E0 0%, #8FC8E8 100%); color: #fff; border-radius: var(--radius) var(--radius) 0 0; }
.cal-day-popup-header h3 { font-size: 15px; font-weight: 800; }
.cal-day-popup-close { background: rgba(255,255,255,0.25); border: none; color: #fff; font-size: 16px; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: var(--font); font-weight: 700; transition: background 0.15s; }
.cal-day-popup-close:hover { background: rgba(255,255,255,0.4); }
.cal-day-popup-body { padding: 12px 16px; overflow-y: auto; max-height: calc(70vh - 56px); }
.cal-day-popup-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; font-size: 12px; font-weight: 600; transition: background 0.1s; }
.cal-day-popup-item:hover { background: rgba(107,181,224,0.06); }
.cal-day-popup-item .popup-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cal-day-popup-item .popup-name { flex: 1; }
.cal-day-popup-item .popup-tag { font-size: 9px; padding: 1px 6px; border-radius: 5px; font-weight: 700; white-space: nowrap; }
.cal-day-popup-empty { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 12px; }

/* Progress Report */
.progress-report { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
.progress-report-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1.5px solid var(--border); background: linear-gradient(135deg, rgba(107,201,160,0.12), rgba(107,201,160,0.04)); }
.progress-report-header h3 { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
.progress-report-body { padding: 14px 18px; }
.progress-report-text { font-family: var(--font); font-size: 12px; color: var(--text); line-height: 1.8; white-space: pre-wrap; background: rgba(245,249,252,0.6); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.progress-copy-btn { font-family: var(--font); font-size: 11px; font-weight: 700; padding: 5px 14px; border-radius: 8px; border: 1.5px solid var(--success); background: rgba(107,201,160,0.1); color: var(--success); cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px; }
.progress-copy-btn:hover { background: var(--success); color: #fff; }
.progress-none { font-size: 12px; color: var(--text-secondary); padding: 8px 0; }

/* Board (任務版) */
.board-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.board-header h2 { font-size: 18px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 8px; }
.board-header .count { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 8px; }

.board-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; transition: box-shadow 0.2s; }
.board-card:hover { box-shadow: var(--shadow-lg); }
.board-card-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid rgba(216,232,240,0.5); background: linear-gradient(135deg, rgba(220,238,250,0.3), rgba(200,228,245,0.15)); }
.board-card-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); }
.board-card-dates { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
.board-status { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.board-status.active { background: rgba(107,181,224,0.15); color: var(--accent-hover); }
.board-status.soon { background: rgba(232,168,76,0.15); color: var(--warn); }
.board-status.overdue { background: rgba(224,112,112,0.15); color: var(--danger); }

.board-card-body { padding: 14px 18px; }
.board-field { margin-bottom: 10px; }
.board-field:last-child { margin-bottom: 0; }
.board-field-label { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 3px; }
.board-field-value { font-size: 12px; color: var(--text); line-height: 1.6; min-height: 20px; padding: 4px 8px; border-radius: 6px; border: 1px solid transparent; transition: all 0.15s; }
.board-field-value[contenteditable="true"]:hover { background: rgba(107,181,224,0.04); border-color: rgba(107,181,224,0.15); }
.board-field-value[contenteditable="true"]:focus { background: rgba(107,181,224,0.08); border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(107,181,224,0.1); }
.board-field-value.empty-hint:empty::before { content: attr(data-placeholder); color: var(--text-secondary); opacity: 0.5; font-style: italic; }
.board-card-footer { display: flex; align-items: center; justify-content: flex-end; padding: 10px 18px; border-top: 1px solid rgba(216,232,240,0.5); }

.board-done-section { margin-top: 20px; }
.board-done-toggle { display: flex; align-items: center; gap: 8px; padding: 12px 18px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--text-secondary); width: 100%; transition: all 0.2s; }
.board-done-toggle:hover { background: rgba(107,181,224,0.04); border-color: var(--accent); color: var(--text); }
.board-done-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
.board-done-toggle.open .arrow { transform: rotate(90deg); }
.board-done-cards { display: none; margin-top: 8px; }
.board-done-cards.open { display: block; }
.board-card.done-card { opacity: 0.75; }
.board-card.done-card .board-card-header { background: linear-gradient(135deg, rgba(107,201,160,0.1), rgba(107,201,160,0.05)); }
.board-result-link a { color: var(--accent); text-decoration: underline; word-break: break-all; }

/* Gantt chart */
.gantt-scroll { overflow: auto; max-height: 76vh; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); position: relative; }
.gantt-row { display: flex; min-width: min-content; border-bottom: 1px solid rgba(216,232,240,0.5); }
.gantt-row:last-child { border-bottom: none; }
.gantt-row:nth-child(even) .gantt-left { background: rgba(245,249,252,0.7); }
.gantt-row:nth-child(even) .gantt-track { background-color: rgba(245,249,252,0.4); }
.gantt-left { position: sticky; left: 0; background: var(--surface); width: 180px; min-width: 180px; z-index: 2; padding: 6px 10px; border-right: 1.5px solid var(--border); }
.gantt-left-name { font-weight: 700; font-size: 11px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }

// ═══════════════════════════════════════
// Data Layer
// ═══════════════════════════════════════
let data;

function loadData() {
  // Try v3
  let raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      data = JSON.parse(raw);
      if (!data.overrides) data.overrides = {};
      if (!data.completions) data.completions = {};
      if (!data.mainTasks) data.mainTasks = [];
      if (!data.nextMid) data.nextMid = 1;
      // Auto-supplement missing default tasks
      supplementDefaults();
      return;
    } catch(e) {}
  }
  // Try migrate v2
  raw = localStorage.getItem('ops-tasks-v2');
  if (raw) {
    try {
      data = JSON.parse(raw);
      data.overrides = {}; data.completions = {};
      data.mainTasks = []; data.nextMid = 1;
      data.todos.forEach(t => { if (!t.dueDate) t.dueDate = t.createdDate || toDateStr(new Date()); });
      supplementDefaults();
      saveData(); return;
    } catch(e) {}
  }
  // Fresh
  data = { tasks: [], todos: [], mainTasks: [], overrides: {}, completions: {}, nextId: 1, nextTid: 1, nextMid: 1 };
  DEFAULT_TASKS.forEach(t => data.tasks.push({ id: data.nextId++, ...t }));
  saveData();
}

function supplementDefaults() {
  let changed = false;
  // Add missing tasks AND fill in empty fields on existing tasks
  DEFAULT_TASKS.forEach(dt => {
    const match = data.tasks.find(t => t.name === dt.name && t.freq === dt.freq);
    if (!match) {
      // Task missing entirely — add it
      data.tasks.push({ id: data.nextId++, ...dt });
      changed = true;
    } else {
      // Task exists — fill in any blank fields from default
      ['how','note','link','owner','dom','start'].forEach(field => {
        if (!match[field] && dt[field]) {
          match[field] = dt[field];
          changed = true;
        }
      });
    }
  });
  if (changed) saveData();
}

function resetData() {
  if (!confirm('確定要重置為預設資料嗎？你新增的庶務待辦和主要任務會保留，但例行任務會回到預設值。')) return;
  const savedTodos = data.todos || [];
  const savedMain = data.mainTasks || [];
  data = { tasks: [], todos: savedTodos, mainTasks: savedMain, overrides: {}, completions: {}, nextId: 1, nextTid: data.nextTid || 1, nextMid: data.nextMid || 1 };
  DEFAULT_TASKS.forEach(t => data.tasks.push({ id: data.nextId++, ...t }));
  saveData();
  renderAll();
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ops-dashboard-backup-' + toDateStr(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.tasks) { alert('檔案格式不正確'); return; }
      if (!confirm('確定要匯入嗎？將會覆蓋目前所有資料。')) return;
      data = imported;
      saveData();
      renderAll();
      alert('匯入成功！');
    } catch(err) { alert('檔案讀取失敗：' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ═══════════════════════════════════════
// Date Helpers
// ═══════════════════════════════════════
function toDateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseDate(s) { if (!s) return null; const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function daysBetween(a,b) { return Math.round((b-a)/86400000); }
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function formatDateFull(d) { const dow=['日','一','二','三','四','五','六']; return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日（${dow[d.getDay()]}）`; }
function formatDateShort(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function esc(s) { if(!s)return''; const e=document.createElement('span'); e.textContent=s; return e.innerHTML; }

// Auto-link URLs in text
function linkify(s) {
  if(!s) return '';
  const escaped = esc(s);
  return escaped.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;word-break:break-all;">$1</a>');
}

// ═══════════════════════════════════════
// Occurrence Engine
// ═══════════════════════════════════════
// Effective "from" date: respects last completion — next occurrence must be AFTER last
function effectiveFrom(task, fromDate) {
  if(!task.last) return fromDate;
  const last = parseDate(task.last);
  if(!last) return fromDate;
  const dayAfter = new Date(last); dayAfter.setDate(dayAfter.getDate()+1);
  return dayAfter > fromDate ? dayAfter : fromDate;
}

function nextOcc(task, fromDate) {
  const from=fromDate||new Date(), f=task.freq, dom=task.dom||15;
  if(f==='daily') {
    const todayD=new Date(from.getFullYear(),from.getMonth(),from.getDate());
    // If completed today, next is tomorrow
    if(isCompleted(task.id, toDateStr(todayD)) || (task.last && task.last >= toDateStr(todayD))) {
      return new Date(todayD.getFullYear(),todayD.getMonth(),todayD.getDate()+1);
    }
    return todayD;
  }
  if(f==='every2days') {
    // Prefer last completion + 2 days; fallback to start-based pattern
    if(task.last) {
      const last=parseDate(task.last);
      if(last) {
        let d=new Date(last); d.setDate(d.getDate()+2);
        while(d<from) d.setDate(d.getDate()+2);
        return d;
      }
    }
    const start=parseDate(task.start)||new Date(2026,0,1);
    const diff=daysBetween(start,from);
    const rem=((diff%2)+2)%2;
    let d=rem===0?new Date(from.getFullYear(),from.getMonth(),from.getDate()):new Date(from.getFullYear(),from.getMonth(),from.getDate()+1);
    if(isCompleted(task.id, toDateStr(d))) d.setDate(d.getDate()+2);
    return d;
  }
  if(f==='weekly') {
    // Priority 1: fixed day-of-week (dow is set)
    // next = first date >= max(from, last+1) whose getDay() matches dow
    const dowSet = (task.dow!==undefined && task.dow!==null && task.dow!=='');
    if(dowSet) {
      const targetDow = +task.dow;
      let searchFrom = new Date(from);
      if(task.last) {
        const last = parseDate(task.last);
        if(last) {
          const dayAfter = new Date(last); dayAfter.setDate(dayAfter.getDate()+1);
          if(dayAfter > searchFrom) searchFrom = dayAfter;
        }
      }
      let d = new Date(searchFrom);
      while(d.getDay() !== targetDow) d.setDate(d.getDate()+1);
      return d;
    }
    // Priority 2: last completion + 7 days
    if(task.last) {
      const last = parseDate(task.last);
      if(last) {
        let d = new Date(last); d.setDate(d.getDate()+7);
        while(d<from) d.setDate(d.getDate()+7);
        return d;
      }
    }
    // Priority 3: start-anchor + 7n (fallback for brand-new task with no last/dow)
    const start = parseDate(task.start) || from;
    let d = new Date(start);
    while(d<from) d.setDate(d.getDate()+7);
    return d;
  }
  if(f==='monthly') {
    const effFrom = effectiveFrom(task, from);
    let y=effFrom.getFullYear(),m=effFrom.getMonth();
    let d=new Date(y,m,Math.min(dom,daysInMonth(y,m)));
    if(d<effFrom){m++;if(m>11){m=0;y++;}d=new Date(y,m,Math.min(dom,daysInMonth(y,m)));} return d;
  }
  if(f==='bimonthly') {
    const effFrom = effectiveFrom(task, from);
    let y=effFrom.getFullYear(),m=effFrom.getMonth();
    for(let i=0;i<14;i++){let cm=(m+i)%12,cy=y+Math.floor((m+i)/12);
    if(cm%2===0){let d=new Date(cy,cm,Math.min(dom,daysInMonth(cy,cm)));if(d>=effFrom)return d;}} return effFrom;
  }
  if(f==='quarterly') {
    // Every 3 months from last completion (or start date)
    const anchor = parseDate(task.last) || parseDate(task.start) || new Date(2026,0,1);
    let y=anchor.getFullYear(), m=anchor.getMonth();
    // If there's a last date, next is 3 months after last; otherwise use anchor's month
    if(task.last) { m+=3; if(m>11){m-=12;y++;} }
    let d=new Date(y,m,Math.min(dom,daysInMonth(y,m)));
    while(d<from){ m+=3; if(m>11){m-=12;y++;} d=new Date(y,m,Math.min(dom,daysInMonth(y,m))); }
    return d;
  }
  if(f==='yearly') {
    // Prefer last completion date + 1 year as anchor; fallback to task.start
    const anchor = parseDate(task.last) || parseDate(task.start) || from;
    let y = task.last ? anchor.getFullYear()+1 : anchor.getFullYear();
    const mm = anchor.getMonth(), dd = anchor.getDate();
    let d = new Date(y, mm, Math.min(dd, daysInMonth(y, mm)));
    while(d < from) { y++; d = new Date(y, mm, Math.min(dd, daysInMonth(y, mm))); }
    return d;
  }
  return from;
}

function getOccRange(task, fromDate, toDate) {
  const R=[], f=task.freq, dom=task.dom||15;
  if(f==='daily'){let d=new Date(fromDate);while(d<=toDate){R.push(new Date(d));d.setDate(d.getDate()+1);}return R;}
  if(f==='every2days'){
    const start=parseDate(task.start)||new Date(2026,0,1);
    let d=new Date(fromDate);
    const diff0=daysBetween(start,d); const rem=((diff0%2)+2)%2;
    if(rem!==0) d.setDate(d.getDate()+1);
    while(d<=toDate){R.push(new Date(d));d.setDate(d.getDate()+2);} return R;
  }
  if(f==='weekly'){
    if(task.dow!==undefined && task.dow!==null && task.dow!=='') {
      const targetDow=+task.dow;
      let d=new Date(fromDate);
      while(d.getDay()!==targetDow) d.setDate(d.getDate()+1);
      while(d<=toDate){R.push(new Date(d));d.setDate(d.getDate()+7);}
      return R;
    }
    const start=parseDate(task.start)||fromDate;let d=new Date(start);while(d<fromDate)d.setDate(d.getDate()+7);while(d<=toDate){R.push(new Date(d));d.setDate(d.getDate()+7);}return R;
  }
  if(f==='monthly'){let y=fromDate.getFullYear(),m=fromDate.getMonth();for(let i=0;i<14;i++){const d=new Date(y,m,Math.min(dom,daysInMonth(y,m)));if(d>toDate)break;if(d>=fromDate)R.push(d);m++;if(m>11){m=0;y++;}}return R;}
  if(f==='bimonthly'){let y=fromDate.getFullYear(),m=fromDate.getMonth();for(let i=0;i<14;i++){let cm=(m+i)%12,cy=y+Math.floor((m+i)/12);if(cm%2===0){let d=new Date(cy,cm,Math.min(dom,daysInMonth(cy,cm)));if(d>toDate)break;if(d>=fromDate)R.push(d);}}return R;}
  if(f==='quarterly'){
    // Every 3 months from last completion (or start date)
    const anchor=parseDate(task.last)||parseDate(task.start)||new Date(2026,0,1);
    let y=anchor.getFullYear(),m=anchor.getMonth();
    if(task.last){m+=3;if(m>11){m-=12;y++;}}
    for(let i=0;i<20;i++){
      const d=new Date(y,m,Math.min(dom,daysInMonth(y,m)));
      if(d>toDate)break;
      if(d>=fromDate)R.push(d);
      m+=3;if(m>11){m-=12;y++;}
    }
    return R;
  }
  if(f==='yearly'){
    const anchor=parseDate(task.last)||parseDate(task.start)||fromDate;
    const startY=task.last?anchor.getFullYear()+1:Math.max(anchor.getFullYear(),fromDate.getFullYear());
    for(let i=0;i<5;i++){
      const y=startY+i;
      const d=new Date(y,anchor.getMonth(),Math.min(anchor.getDate(),daysInMonth(y,anchor.getMonth())));
      if(d>toDate)break;
      if(d>=fromDate)R.push(d);
    }
    return R;
  }
  return R;
}

// Override-aware occurrences
function getEffective(task, fromDate, toDate) {
  const raw = getOccRange(task, fromDate, toDate);
  const result = [];
  // Check for overrides that move occurrences away
  raw.forEach(d => {
    const key = task.id + '_' + toDateStr(d);
    if (data.overrides[key]) {
      // Moved elsewhere — check if moved-to is in range
      const newD = parseDate(data.overrides[key]);
      if (newD >= fromDate && newD <= toDate) result.push({ date: newD, overridden: true });
    } else {
      result.push({ date: d, overridden: false });
    }
  });
  // Check for overrides that move occurrences INTO this range from outside
  for (const key in data.overrides) {
    if (!key.startsWith(task.id + '_')) continue;
    const origStr = key.split('_').slice(1).join('_');
    const orig = parseDate(origStr);
    if (orig >= fromDate && orig <= toDate) continue; // already handled above
    const newD = parseDate(data.overrides[key]);
    if (newD >= fromDate && newD <= toDate) result.push({ date: newD, overridden: true });
  }
  return result;
}

function isCompleted(taskId, dateStr) { return !!data.completions[taskId + '_' + dateStr]; }

// ═══════════════════════════════════════
// Today Banner (Main/Side split)
// ═══════════════════════════════════════
function renderTodayBanner() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  document.getElementById('today-date-str').textContent = formatDateFull(today);

  // ── 主線：進行中 + 今天剛完成的 ──
  const mainLine = [];
  (data.mainTasks||[]).forEach(t => {
    if (t.startDate && t.startDate > todayStr) return;
    // 今天完成的：顯示一天
    if (t.done && t.doneDate === todayStr) {
      mainLine.push({ name: t.name, done: true, overdue: false, deadline: t.deadline||'', nextAction: '', result: t.result||'' });
      return;
    }
    if (t.done) return;
    if (t.deadline) {
      const dl = parseDate(t.deadline);
      const overdue = dl < today;
      mainLine.push({ name: t.name, done: false, overdue, deadline: t.deadline, nextAction: t.nextAction || '', result: t.result||'' });
    }
  });

  // ── 支線：需同步給同事的例行任務（非每天/每兩天）──
  const sideLine = [];
  // ── 庶務：每天/每兩天的例行任務 + 庶務待辦 ──
  const choreLine = [];

  data.tasks.forEach(task => {
    const effs = getEffective(task, today, today);
    effs.forEach(e => {
      const done = isCompleted(task.id, toDateStr(e.date));
      const item = { name: task.name, done };
      if (task.freq === 'daily' || task.freq === 'every2days') {
        choreLine.push(item);
      } else {
        sideLine.push(item);
      }
    });
  });
  // 庶務待辦歸到庶務
  data.todos.filter(t => !t.done && (!t.dueDate || t.dueDate <= todayStr)).forEach(t => {
    choreLine.push({ name: t.name || '（未命名待辦）', done: false });
  });

  let html = '';
  // 主線（point form）
  html += '<div class="today-section"><div class="today-section-label">⭐ 主線任務</div>';
  if (mainLine.length === 0) html += '<div class="today-tasks-list"><span class="today-none">目前沒有主線任務 🐾</span></div>';
  else {
    html += '<div style="margin-top:4px;">';
    mainLine.forEach(t => {
      const dlLabel = t.deadline ? formatDateShort(parseDate(t.deadline)) : '';
      if(t.done) {
        // 今天完成的，顯示 ✅ + 成果
        html += `<div style="margin-bottom:5px;opacity:0.7;">
          <div style="font-size:12px;font-weight:700;text-decoration:line-through;">✅ ${esc(t.name)}</div>
          ${t.result ? '<div style="margin-left:16px;font-size:11px;opacity:0.9;">'+esc(t.result)+'</div>' : ''}
        </div>`;
      } else {
        const actionText = t.nextAction ? esc(t.nextAction) : '<span style="opacity:0.5;font-style:italic;">（未設定下一步）</span>';
        html += `<div style="margin-bottom:5px;">
          <div style="font-size:12px;font-weight:700;">${t.overdue?'⏰ ':'• '}${esc(t.name)}</div>
          <div style="margin-left:16px;font-size:11px;opacity:0.9;">${dlLabel} — ${actionText}</div>
        </div>`;
      }
    });
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="today-divider"></div>';

  // 支線
  html += '<div class="today-section"><div class="today-section-label">📋 支線任務</div><div class="today-tasks-list">';
  if (sideLine.length === 0) html += '<span class="today-none">今天沒有支線任務 🐾</span>';
  else sideLine.forEach(t => {
    html += `<div class="today-task-chip ${t.done?'completed':''}">${esc(t.name)}</div>`;
  });
  html += '</div></div>';

  html += '<div class="today-divider"></div>';

  // 庶務
  html += '<div class="today-section"><div class="today-section-label">🧹 庶務</div><div class="today-tasks-list">';
  if (choreLine.length === 0) html += '<span class="today-none">今天沒有庶務 🐾</span>';
  else choreLine.forEach(t => {
    html += `<div class="today-task-chip ${t.done?'completed':''}">${esc(t.name)}</div>`;
  });
  html += '</div></div>';

  document.getElementById('today-content').innerHTML = html;

  // Tab badge
  const total = mainLine.length + sideLine.filter(t=>!t.done).length + choreLine.filter(t=>!t.done).length;
  const tabBtn = document.querySelector('.tab[data-tab="tasks"]');
  tabBtn.innerHTML = total > 0 ? `📋 任務管理 <span class="badge">${total}</span>` : '📋 任務管理';
}

// Task Table (grouped by frequency)
// ═══════════════════════════════════════
function renderTable() {
  const container = document.getElementById('task-sections');
  const today = new Date(); today.setHours(0,0,0,0);
  const groups = {};
  data.tasks.forEach(t => { if(!groups[t.freq])groups[t.freq]=[]; groups[t.freq].push(t); });

  let html = `<div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <button class="btn btn-primary" onclick="toggleAddForm()">✨ 新增任務</button></div>`;

  FREQ_GROUP_ORDER.forEach(freq => {
    const tasks = groups[freq];
    if (!tasks || !tasks.length) return;
    tasks.sort((a,b) => nextOcc(a, today) - nextOcc(b, today));
    const fc = FREQ_COLORS[freq], emoji = FREQ_EMOJI[freq];
    const needsDom = ['monthly','bimonthly','quarterly'].includes(freq);
    const needsDow = freq === 'weekly';
    const dayConfigHeader = needsDom ? '執行日' : (needsDow ? '週幾' : '');

    html += `<div class="section-card freq-drop-zone" data-freq="${freq}"
      ondragover="taskDragOver(event)" ondragleave="taskDragLeave(event)" ondrop="taskDrop(event,'${freq}')">
      <div class="section-header">
      <h2>${emoji} ${FREQ_LABELS[freq]}任務 <span class="count">${tasks.length}</span></h2></div>
      <div class="table-scroll"><table class="task-table"><thead><tr>
        <th class="col-done"></th><th style="min-width:140px">項目</th>
        <th style="min-width:180px">執行方式</th>
        ${dayConfigHeader?`<th style="width:75px">${dayConfigHeader}</th>`:''}
        <th class="col-next">下次執行</th><th class="col-last">上次整理</th>
        <th class="col-owner">負責人</th><th style="min-width:100px">備註</th><th style="width:90px">連結</th><th class="col-del"></th>
      </tr></thead><tbody>`;

    tasks.forEach(t => {
      const next = nextOcc(t, today);
      const diff = daysBetween(today, next);
      let nc = 'next-normal';
      if(diff<0)nc='next-overdue';else if(diff===0)nc='next-today';else if(diff<=7)nc='next-soon';

      html += `<tr data-id="${t.id}" draggable="true" ondragstart="taskRowDragStart(event,${t.id})" style="cursor:grab;"><td class="col-done">
        <button class="done-circle" onclick="markDone(${t.id})" title="標記完成"></button></td>
        <td>
          <div class="task-name-main editable" contenteditable="true" onblur="updateField(${t.id},'name',this.textContent)">${esc(t.name)}</div>
        </td>
        <td>
          <div class="editable task-name-how" style="min-height:20px;" contenteditable="true" onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')" onblur="this.setAttribute('data-raw',this.textContent);updateField(${t.id},'how',this.textContent);this.innerHTML=linkify(this.textContent)" data-raw="${esc(t.how||'')}">${linkify(t.how||'')}</div>
        </td>
        ${needsDom?`<td><input type="number" class="dom-input" value="${t.dom||''}" min="1" max="31" onchange="updateField(${t.id},'dom',+this.value)">號</td>`:''}
        ${needsDow?`<td><select class="freq-select" style="width:70px" onchange="updateField(${t.id},'dow',this.value===''?null:+this.value)">
          <option value="" ${(t.dow===undefined||t.dow===null||t.dow==='')?'selected':''}>—</option>
          ${DOW_LABELS.map((lbl,i)=>`<option value="${i}" ${+t.dow===i?'selected':''}>${lbl}</option>`).join('')}
        </select></td>`:''}
        <td class="col-next"><span class="${nc}">${diff===0?'🔴 今天':diff<0?'⏰ 過期':formatDateShort(next)}</span></td>
        <td class="col-last"><input type="date" class="date-input" value="${t.last||''}" onchange="updateField(${t.id},'last',this.value)"></td>
        <td class="col-owner"><div class="editable" contenteditable="true" onblur="updateField(${t.id},'owner',this.textContent)">${esc(t.owner||'')}</div></td>
        <td><div class="editable" contenteditable="true" onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')" onblur="this.setAttribute('data-raw',this.textContent);updateField(${t.id},'note',this.textContent);this.innerHTML=linkify(this.textContent)" data-raw="${esc(t.note||'')}">${linkify(t.note||'')}</div></td>
        <td>${t.link?`<a class="task-name-link" href="${esc(t.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 連結</a>`:''}
          <div class="editable" style="font-size:9px;word-break:break-all;color:var(--text-secondary);margin-top:2px;" contenteditable="true" onfocus="this.textContent=this.getAttribute('data-raw')||''" onblur="this.setAttribute('data-raw',this.textContent);updateField(${t.id},'link',this.textContent);this.textContent=this.textContent?'✏️ 編輯連結':'+ 加連結'" data-raw="${esc(t.link||'')}">${t.link?'✏️ 編輯連結':'+ 加連結'}</div></td>
        <td class="col-del"><button class="del-btn" onclick="deleteTask(${t.id})">&times;</button></td></tr>`;
    });
    html += '</tbody></table></div></div>';
  });
  container.innerHTML = html;
}

function updateField(id, field, value) {
  const t = data.tasks.find(x=>x.id===id); if(!t)return;
  t[field] = typeof value==='string'?value.trim():value;
  saveData(); renderAll();
}

function markDone(id) {
  const t = data.tasks.find(x=>x.id===id); if(!t)return;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  t.last = todayStr;
  data.completions[id+'_'+todayStr] = true;
  saveData();
  const btn = document.querySelector(`tr[data-id="${id}"] .done-circle`);
  if(btn){btn.classList.add('checked');setTimeout(()=>{btn.classList.remove('checked');renderAll();},600);}

}

function deleteTask(id) {
  if(!confirm('確定要刪除這個任務嗎？'))return;
  data.tasks=data.tasks.filter(t=>t.id!==id); saveData(); renderAll();
}

// ── Task row drag between frequency groups ──
function taskRowDragStart(e, taskId) {
  e.dataTransfer.setData('text/plain', 'task_' + taskId);
  e.dataTransfer.effectAllowed = 'move';
}

function taskDragOver(e) {
  e.preventDefault();
  const zone = e.currentTarget;
  zone.classList.add('drag-over-freq');
}

function taskDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-freq');
}

function taskDrop(e, targetFreq) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over-freq');
  const raw = e.dataTransfer.getData('text/plain');
  if (!raw || !raw.startsWith('task_')) return;
  const taskId = +raw.replace('task_', '');
  const task = data.tasks.find(t => t.id === taskId);
  if (!task || task.freq === targetFreq) return;
  // Change frequency
  task.freq = targetFreq;
  // Set default dom if moving to a freq that needs it
  if (['monthly','bimonthly','quarterly'].includes(targetFreq) && !task.dom) {
    task.dom = 15;
  }
  saveData();
  renderAll();
}

function carryOverTodos() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  data.todos.forEach(t => {
    if(!t.dueDate) t.dueDate = t.createdDate||todayStr;
    if(!t.done && t.dueDate < todayStr) {
      t.dueDate = todayStr;
    }
  });
  data.todos.forEach(t => { delete t.carriedOver; });
  saveData();
}

function renderTodos() {
  const active = data.todos.filter(t=>!t.done);
  active.sort((a,b) => {
    if(!a.dueDate && !b.dueDate) return 0;
    if(!a.dueDate) return -1;
    if(!b.dueDate) return 1;
    return a.dueDate < b.dueDate ? -1 : a.dueDate > b.dueDate ? 1 : 0;
  });
  document.getElementById('todo-count').textContent = active.length;
  const tbody = document.getElementById('todo-tbody');
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  if(!active.length){ tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:18px;color:var(--text-secondary);font-size:12px;">🐾 目前沒有待辦事項</td></tr>`; return; }
  tbody.innerHTML = active.map(t=>{
    const scheduled = t.dueDate && t.dueDate > todayStr;
    const schedLabel = t.dueDate ? (scheduled ? formatDateShort(parseDate(t.dueDate)) : '今天') : '—';
    const schedClass = scheduled ? 'next-normal' : 'next-today';
    return `<tr class="todo-row ${scheduled?'scheduled-future':''}" data-tid="${t.id}" style="${scheduled?'opacity:0.55;':''}">
      <td class="todo-col-check"><input type="checkbox" class="todo-check" onchange="todoCheck(${t.id})" ${scheduled?'disabled':''}></td>
      <td class="todo-col-name">
        <div class="editable" contenteditable="true" onblur="updateTodo(${t.id},'name',this.textContent)">${esc(t.name||'')}</div>
        ${scheduled?'<span style="font-size:9px;color:var(--accent);font-weight:700;">📅 尚未到期</span>':''}
      </td>
      <td><span class="${schedClass}" style="font-size:12px;">${schedLabel}</span>
        <input type="date" class="date-input" value="${t.dueDate||''}" onchange="updateTodo(${t.id},'dueDate',this.value)" style="width:100px;font-size:10px;"></td>
      <td class="todo-col-note"><div class="editable" contenteditable="true" onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')" onblur="this.setAttribute('data-raw',this.textContent);updateTodo(${t.id},'note',this.textContent);this.innerHTML=linkify(this.textContent)" data-raw="${esc(t.note||'')}">${linkify(t.note||'')}</div></td>
      <td class="todo-col-del"><button class="del-btn" onclick="deleteTodo(${t.id})" style="opacity:1">&times;</button></td>

function toggleMainForm() { const f=document.getElementById('main-add-form'); f.style.display=f.style.display==='none'?'block':'none'; }

function renderMainTasks() {
  const active = data.mainTasks.filter(t=>!t.done);
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  // Sort: started tasks first, then not-started; within each group sort by deadline
  active.sort((a,b) => {
    const notStartedA = a.startDate && a.startDate > todayStr ? 1 : 0;
    const notStartedB = b.startDate && b.startDate > todayStr ? 1 : 0;
    if(notStartedA !== notStartedB) return notStartedA - notStartedB;
    if(!a.deadline && !b.deadline) return 0;
    if(!a.deadline) return -1;
    if(!b.deadline) return 1;
    return a.deadline < b.deadline ? -1 : a.deadline > b.deadline ? 1 : 0;
  });
  document.getElementById('main-count').textContent = active.length;
  const tbody = document.getElementById('main-tbody');
  if(!active.length){ tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:18px;color:var(--text-secondary);font-size:12px;">🐾 目前沒有主要任務</td></tr>`; return; }
  tbody.innerHTML = active.map(t=>{
    const dl = parseDate(t.deadline);
    const st = parseDate(t.startDate);
    const dlDiff = dl ? daysBetween(today, dl) : 999;
    const notStarted = t.startDate && t.startDate > todayStr;

    // Deadline display
    let dlClass = '', dlText = t.deadline ? formatDateShort(dl) : '—';
    if (dlDiff < 0) { dlClass = 'next-overdue'; dlText = '⏰ ' + dlText; }
    else if (dlDiff === 0) { dlClass = 'next-today'; dlText = '🔴 今天'; }
    else if (dlDiff <= 3) { dlClass = 'next-soon'; }

    // Start date display
    let stText = t.startDate ? formatDateShort(st) : '立即';
    let stClass = notStarted ? 'next-normal' : 'next-today';

    return `<tr class="todo-row" data-mid="${t.id}" style="${notStarted?'opacity:0.5;':''}">
      <td class="todo-col-check"><button class="done-circle" onclick="mainDone(${t.id})" title="完成" ${notStarted?'disabled':''}></button></td>
      <td class="todo-col-name">
        <div class="editable" contenteditable="true" onblur="updateMain(${t.id},'name',this.textContent)">${esc(t.name||'')}</div>
        ${notStarted?'<span style="font-size:9px;color:var(--accent);font-weight:700;">📅 尚未開始</span>':''}
      </td>
      <td><span class="${stClass}" style="font-size:11px;">${stText}</span>
        <input type="date" class="date-input" value="${t.startDate||''}" onchange="updateMain(${t.id},'startDate',this.value)" style="width:95px;font-size:10px;"></td>
      <td><span class="${dlClass}" style="font-size:11px;">${dlText}</span>
        <input type="date" class="date-input" value="${t.deadline||''}" onchange="updateMain(${t.id},'deadline',this.value)" style="width:95px;font-size:10px;"></td>
      <td><div class="editable" style="font-size:12px;font-weight:600;color:var(--accent-hover);" contenteditable="true" onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')" onblur="this.setAttribute('data-raw',this.textContent);updateMain(${t.id},'nextAction',this.textContent);this.innerHTML=linkify(this.textContent)" data-raw="${esc(t.nextAction||'')}">${linkify(t.nextAction||'')}</div></td>
      <td class="todo-col-note"><div class="editable" contenteditable="true" onfocus="this.innerHTML=esc(this.getAttribute('data-raw')||'')" onblur="this.setAttribute('data-raw',this.textContent);updateMain(${t.id},'note',this.textContent);this.innerHTML=linkify(this.textContent)" data-raw="${esc(t.note||'')}">${linkify(t.note||'')}</div></td>
      <td class="todo-col-del"><button class="del-btn" onclick="deleteMain(${t.id})" style="opacity:1">&times;</button></td>
    </tr>`;
  }).join('');
}
